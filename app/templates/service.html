{% extends "base.html" %}
{% block content %}
  <h1>Add Service</h1>
  <form method="POST" action="{{ url_for('main.add_service') }}">
    {{ form.hidden_tag() }}
    <div>
      {{ form.name.label }} {{ form.name(size=32) }}
    </div>
    <div>
      {{ form.price.label }} {{ form.price(size=32) }}
    </div>
    <div>
      {{ form.submit() }}
    </div>
  </form>
{% endblock %}
